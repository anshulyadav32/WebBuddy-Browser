name: web_buddy
description: "A privacy-focused, modern web browser built with Flutter."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  # riverpod: ^3.2.1 (removed, use flutter_riverpod only)
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.4.9

  # Routing
  go_router: ^17.1.0

  # Persistence (lightweight for Phase 1)
  shared_preferences: ^2.3.4

  # WebView
  webview_flutter: ^4.12.0
  webview_windows: ^0.4.0

  # Downloads
  dio: ^5.7.0
  path_provider: ^2.1.5
  open_file: ^3.5.10

  # File picker (uploads)
  file_picker: ^10.3.10

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  collection: ^1.19.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/filter_lists/
